name: release

# Cut a release by pushing a semver tag:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # needed to create the GitHub Release and upload assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the changelog can be built

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Track the version declared in go.mod so CI never drifts from local.
          go-version-file: go.mod

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Build the Chrome extension and zip it so install-script users (who
      # don't clone the repo) can download and "Load unpacked" it. dist/ and
      # node_modules/ are gitignored, so this leaves the tree clean for
      # GoReleaser's dirty-state check.
      - name: Build & package Chrome extension
        run: |
          npm --prefix extension ci
          npm --prefix extension run build
          (cd extension/dist && zip -qr "$GITHUB_WORKSPACE/pickmem-extension_${{ github.ref_name }}.zip" .)

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
